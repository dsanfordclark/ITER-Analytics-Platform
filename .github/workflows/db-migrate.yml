name: Database Migrations

on:
  pull_request:
    paths:
      - 'packages/db/migrations/**'
      - 'packages/db/seed/**'
  push:
    branches: [main]
    paths:
      - 'packages/db/migrations/**'

jobs:
  validate-migrations:
    name: Validate Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start -x realtime,storage-api,imgproxy,inbucket,postgrest,pgadmin-schema-diff,migra,postgres-meta,studio,edge-runtime,logflare,vector

      - name: Apply migrations
        run: supabase db push --local

      - name: Verify no drift
        run: |
          DIFF=$(supabase db diff --local)
          if [ -n "$DIFF" ]; then
            echo "Schema drift detected!"
            echo "$DIFF"
            exit 1
          fi
          echo "No schema drift detected."

      - name: Generate types
        run: supabase gen types typescript --local > packages/db/types/database.ts

      - name: Stop Supabase
        if: always()
        run: supabase stop

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: validate-migrations
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy migrations to staging
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
